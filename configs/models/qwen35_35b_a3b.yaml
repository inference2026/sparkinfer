# Qwen3.5-35B-A3B architecture specification
# Source: https://huggingface.co/Qwen/Qwen3.5-35B-A3B/blob/main/config.json

model:
  name: Qwen3.5-35B-A3B
  family: qwen3
  total_params_b: 35
  active_params_b: 3     # only ~3B compute per forward pass

attention:
  num_hidden_layers: 40
  hidden_size: 2048
  num_attention_heads: 16
  num_key_value_heads: 2     # 8:1 GQA ratio — very aggressive, tiny KV cache
  head_dim: 128
  max_position_embeddings: 262144   # 262K context
  rope_theta: 10_000_000
  sliding_window: null

moe:
  num_experts: 256
  num_experts_per_tok: 8       # top-8 from 256
  shared_expert: true          # 1 always-active shared expert (DeepSeek-style)
  total_routed_per_tok: 9      # 8 selected + 1 shared
  moe_intermediate_size: 512   # expert FFN width (2048→512→2048, tall-skinny shape)

vocab_size: 248320

# --- Derived optimization-relevant values ---
derived:
  # KV cache per token (bf16): 40 layers * 2 heads * 128 dim * 2 bytes * 2 (K+V)
  kv_bytes_per_token: 40960    # ~40 KB/token
  # At 262K context: 40 * 2 * 262144 * 128 * 2 * 2 = 5.37 GB
  kv_bytes_at_max_ctx_gb: 5.4
  # Expert GEMM shape per token (up projection): [2048, 512] — tall-skinny
  expert_up_shape: [2048, 512]
  expert_down_shape: [512, 2048]
  # Expert weight size (FP16): 2 * 2048 * 512 * 2 bytes = 4MB per expert per layer
  expert_weight_mb: 4.0
  # Total expert weights (FP16): 256 experts * 40 layers * 4MB = 40.96 GB
  total_expert_weight_fp16_gb: 40.96
  # Routing input: softmax over 256 values per token
  router_dim: 256

quantization:
  q4_k_m:
    # ~4.8 bits/param average (K-quants blend 4 and 6 bit per block)
    bits_per_param: 4.8
    estimated_size_gb: 21.0
    # Fits on: RTX 5090 (32GB), RTX Spark (128GB), RTX Pro 6000 (96GB)
    # Tight on: RTX 4090 (24GB) — model + KV cache pushes the limit
    fits_on:
      - RTX 5090       # 32GB — ~11GB headroom for KV cache
      - RTX Spark      # 128GB — fully fits + 100GB+ for KV and experts
      - RTX Pro 6000   # 96GB
    marginal:
      - RTX 4090       # 24GB — 21GB model + large KV = OOM at long context
